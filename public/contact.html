  <!-- OGP -->

  <meta property="og:title" content="お問い合わせ | 司法書士法人ホープス">
  <meta property="og:description" content="相続・遺言・不動産登記・会社設立に関するご相談・お見積りは無料。対面・オンラインどちらも対応可。">
  <meta property="og:url" content="https://www.shihousyoshi-hopes.jp/contact.html">
  <meta property="og:site_name" content="司法書士法人ホープス">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="style.css">

  <!-- 構造化データ: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://www.shihousyoshi-hopes.jp/" },
      { "@type": "ListItem", "position": 2, "name": "お問い合わせ", "item": "https://www.shihousyoshi-hopes.jp/contact.html" }
    ]
  }
  </script>
</head>
<body class="contact-page">

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-main">司法書士法人ホープス</span>
        <span class="logo-divider" aria-hidden="true"></span>
        <span class="logo-en" translate="no">HOPES</span>
      </a>
      <nav>
        <ul class="nav-list" id="navList">
          <li><a href="index.html#service">サービス</a></li>
          <li><a href="index.html#price">料金</a></li>
          <li><a href="index.html#office">事務所概要</a></li>
          <li><a href="privacy.html">個人情報保護方針</a></li>
          <li><a href="contact.html" class="nav-cta">お問い合わせ</a></li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-bg"></div>
    <div class="container">
      <h1>お問い合わせ</h1>
      <p>ご相談・お見積りは無料です。お気軽にご連絡ください。</p>
    </div>
  </div>

  <!-- Form -->
  <section class="contact-section">
    <div class="container">
      <form class="contact-form" action="confirm.php" method="post" id="contactForm" novalidate>

        <div class="form-group">
          <label for="inquiry_type">お問い合わせ内容 <span class="badge-required">必須</span></label>
          <select name="inquiry_type" id="inquiry_type" required>
            <option value="" disabled selected>選択してください</option>
            <option value="相続手続">相続手続</option>
            <option value="遺言書作成支援">遺言書作成支援</option>
            <option value="不動産登記手続">不動産登記手続</option>
            <option value="会社設立・商業登記手続">会社設立・商業登記手続</option>
            <option value="その他">その他</option>
          </select>
          <span class="form-error"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="name_kanji">お名前（漢字）<span class="badge-required">必須</span></label>
            <input type="text" name="name_kanji" id="name_kanji" placeholder="例：高橋 太郎" required>
            <span class="form-error"></span>
          </div>
          <div class="form-group">
            <label for="name_kana">お名前（カナ）<span class="badge-required">必須</span></label>
            <input type="text" name="name_kana" id="name_kana" placeholder="例：タカハシ タロウ" required>
            <span class="form-error"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">メールアドレス <span class="badge-required">必須</span></label>
            <input type="email" name="email" id="email" placeholder="例：example@mail.com" required>
            <span class="form-error"></span>
          </div>
          <div class="form-group">
            <label for="phone">電話番号 <span class="badge-optional">任意</span></label>
            <input type="tel" name="phone" id="phone" placeholder="例：03-1234-5678">
          </div>
        </div>

        <div class="form-group">
          <label>面談方法 <span class="badge-optional">任意</span></label>
          <div class="form-radio-group">
            <label><input type="radio" name="meeting" value="対面"> 対面</label>
            <label><input type="radio" name="meeting" value="オンライン"> オンライン</label>
            <label><input type="radio" name="meeting" value="未定"> 未定</label>
          </div>
        </div>

        <div class="form-group">
          <label for="preferred_date">面談希望日時 <span class="badge-optional">任意</span></label>
          <input type="text" name="preferred_date" id="preferred_date" placeholder="例：3月20日（木）14時〜、3月22日（土）午前中">
        </div>

        <div class="form-group">
          <label for="message">お問い合わせ詳細 <span class="badge-required">必須</span></label>
          <textarea name="message" id="message" placeholder="ご相談内容をご記入ください" required></textarea>
          <span class="form-error"></span>
        </div>

        <div class="form-consent">
          <label class="consent-label">
            <input type="checkbox" name="privacy_agree" id="privacy_agree" required>
            <a href="privacy.html" target="_blank" rel="noopener">個人情報保護方針</a>に同意する
          </label>
          <span class="form-error"></span>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn btn-primary">確認画面へ進む</button>
        </div>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-row">
        <span class="footer-name">司法書士法人ホープス</span>
        <span class="footer-sep" aria-hidden="true"></span>
        <span class="footer-address">〒150-0002 東京都渋谷区渋谷二丁目2番4号 青山アルコープ402号室</span>
        <span class="footer-sep" aria-hidden="true"></span>
        <a href="contact.html">お問い合わせ</a>
        <span class="footer-sep" aria-hidden="true"></span>
        <a href="privacy.html">個人情報保護方針</a>
      </div>
      <div class="footer-bottom">
        &copy; <span id="copyrightYear"></span> 司法書士法人ホープス All Rights Reserved.
      </div>
    </div>
  </footer>

  <script>
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 40);
    });
    const hamburger = document.getElementById('hamburger');
    const navList = document.getElementById('navList');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navList.classList.toggle('active');
    });
    navList.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navList.classList.remove('active');
      });
    });
    document.getElementById('copyrightYear').textContent = new Date().getFullYear();

    /* Form validation */
    const form = document.getElementById('contactForm');
    form.addEventListener('submit', function(e) {
      let valid = true;
      form.querySelectorAll('.form-error').forEach(el => el.textContent = '');
      form.querySelectorAll('.has-error').forEach(el => el.classList.remove('has-error'));

      const rules = [
        { id: 'inquiry_type', msg: 'お問い合わせ内容を選択してください' },
        { id: 'name_kanji', msg: 'お名前（漢字）を入力してください' },
        { id: 'name_kana', msg: 'お名前（カナ）を入力してください' },
        { id: 'email', msg: 'メールアドレスを入力してください' },
        { id: 'message', msg: 'お問い合わせ詳細を入力してください' },
        { id: 'privacy_agree', msg: '個人情報保護方針への同意が必要です' }
      ];

      rules.forEach(function(rule) {
        const el = document.getElementById(rule.id);
        let isEmpty = false;
        if (el.type === 'checkbox') {
          isEmpty = !el.checked;
        } else {
          isEmpty = !el.value.trim();
        }
        if (isEmpty) {
          valid = false;
          const errSpan = el.closest('.form-group, .form-consent').querySelector('.form-error');
          if (errSpan) errSpan.textContent = rule.msg;
          el.classList.add('has-error');
        }
      });

      const emailEl = document.getElementById('email');
      if (emailEl.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())) {
        valid = false;
        const errSpan = emailEl.closest('.form-group').querySelector('.form-error');
        if (errSpan) errSpan.textContent = '正しいメールアドレスを入力してください';
        emailEl.classList.add('has-error');
      }

      if (!valid) e.preventDefault();
    });
  </script>

</body>
</html>
