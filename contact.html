<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 司法書士法人ホープス（渋谷区）</title>
  <meta name="description" content="司法書士法人ホープスへのお問い合わせページ。相続手続・遺言書作成・不動産登記・会社設立に関するご相談・お見積りは無料です。対面・オンラインどちらも対応可。">
  <link rel="canonical" href="https://www.shihousyoshi-hopes.jp/contact.html">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="お問い合わせ | 司法書士法人ホープス">
  <meta property="og:description" content="相続・遺言・不動産登記・会社設立に関するご相談・お見積りは無料。対面・オンラインどちらも対応可。">
  <meta property="og:url" content="https://www.shihousyoshi-hopes.jp/contact.html">
  <meta property="og:site_name" content="司法書士法人ホープス">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary">

  <link rel="stylesheet" href="style.css">

  <!-- 構造化データ: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://www.shihousyoshi-hopes.jp/" },
      { "@type": "ListItem", "position": 2, "name": "お問い合わせ", "item": "https://www.shihousyoshi-hopes.jp/contact.html" }
    ]
  }
  </script>
</head>
<body class="contact-page">

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-main">司法書士法人ホープス</span>
        <span class="logo-divider" aria-hidden="true"></span>
        <span class="logo-en" translate="no">HOPES</span>
      </a>
      <nav>
        <ul class="nav-list" id="navList">
          <li><a href="index.html#about">私たちについて</a></li>
          <li><a href="index.html#service">サービス</a></li>
          <li><a href="index.html#price">料金</a></li>
          <li><a href="index.html#office">事務所概要</a></li>
          <li><a href="contact.html" class="nav-cta">お問い合わせ</a></li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-bg"></div>
    <div class="container">
      <h1>お問い合わせ</h1>
      <p>ご相談・お見積りは無料です。お気軽にご連絡ください。</p>
    </div>
  </div>

  <!-- Form -->
  <section class="contact-section">
    <div class="container">
      <form class="contact-form" action="#" method="post">

        <div class="form-group">
          <label>お問い合わせ内容 <span class="badge-required">必須</span></label>
          <select name="inquiry_type" required>
            <option value="" disabled selected>選択してください</option>
            <option value="相続手続">相続手続</option>
            <option value="遺言書作成支援">遺言書作成支援</option>
            <option value="不動産登記手続">不動産登記手続</option>
            <option value="会社設立・商業登記手続">会社設立・商業登記手続</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>お名前（漢字）<span class="badge-required">必須</span></label>
            <input type="text" name="name_kanji" placeholder="例：高橋 太郎" required>
          </div>
          <div class="form-group">
            <label>お名前（カナ）<span class="badge-required">必須</span></label>
            <input type="text" name="name_kana" placeholder="例：タカハシ タロウ" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>メールアドレス <span class="badge-required">必須</span></label>
            <input type="email" name="email" placeholder="例：example@mail.com" required>
          </div>
          <div class="form-group">
            <label>電話番号 <span class="badge-optional">任意</span></label>
            <input type="tel" name="phone" placeholder="例：03-1234-5678">
          </div>
        </div>

        <div class="form-group">
          <label>面談方法 <span class="badge-optional">任意</span></label>
          <div class="form-radio-group">
            <label><input type="radio" name="meeting" value="対面"> 対面</label>
            <label><input type="radio" name="meeting" value="オンライン"> オンライン</label>
            <label><input type="radio" name="meeting" value="未定"> 未定</label>
          </div>
        </div>

        <div class="form-group">
          <label>面談希望日時 <span class="badge-optional">任意</span></label>
          <input type="text" name="preferred_date" placeholder="例：3月20日（木）14時〜、3月22日（土）午前中">
        </div>

        <div class="form-group">
          <label>お問い合わせ詳細 <span class="badge-required">必須</span></label>
          <textarea name="message" placeholder="ご相談内容をご記入ください" required></textarea>
        </div>

        <div class="form-consent">
          <a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>に同意のうえ、送信してください。
        </div>

        <div class="form-submit">
          <button type="submit" class="btn btn-primary">送信する</button>
        </div>

      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-row">
        <span class="footer-name">司法書士法人ホープス</span>
        <span class="footer-sep" aria-hidden="true"></span>
        <span class="footer-address">東京都渋谷区渋谷二丁目2番4号 青山アルコープ402号室</span>
        <span class="footer-sep" aria-hidden="true"></span>
        <a href="contact.html">お問い合わせ</a>
        <span class="footer-sep" aria-hidden="true"></span>
        <a href="privacy.html">プライバシーポリシー</a>
      </div>
      <div class="footer-bottom">
        &copy; 2025 司法書士法人ホープス All Rights Reserved.
      </div>
    </div>
  </footer>

  <script>
    const header = document.getElementById('header');
    window.addEventListener('scroll', () => {
      header.classList.toggle('scrolled', window.scrollY > 40);
    });
    const hamburger = document.getElementById('hamburger');
    const navList = document.getElementById('navList');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navList.classList.toggle('active');
    });
    navList.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        navList.classList.remove('active');
      });
    });
  </script>

</body>
</html>
